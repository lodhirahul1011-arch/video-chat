services:
  - type: web
    name: video-chat-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: video-chat-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://video-chat-xtbg.onrender.com
      - key: VITE_BACKEND_URL
        value: https://video-chat-xtbg.onrender.com
      - key: VITE_SOCKET_URL
        value: https://video-chat-xtbg.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
